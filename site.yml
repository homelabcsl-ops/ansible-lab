---
- name: DevOps Idempotent Pave Sequence
  hosts: lab_nodes
  vars:
    user_name: '{{ ansible_user }}'
    user_home: '/home/{{ ansible_user }}.linux'

  tasks:
    - name: Provision core Red Hat system packages
      become: true
      ansible.builtin.dnf:
        name:
          - epel-release
          - glibc-langpack-en
          - ncurses-term
          - git
          - zsh
          - make
          - gcc
          - unzip
          - gettext
          - curl
          - wget
          - tar
          - util-linux-user
          - readline-devel
          - podman
          - skopeo
          - buildah
          - tmux
        state: present

    - name: Enforce strict UTF-8 locale for Unicode rendering
      become: true
      ansible.builtin.command: localectl set-locale LANG=en_GB.UTF-8
      changed_when: false

    - name: Enable Extra Packages for Enterprise Linux (EPEL)
      ansible.builtin.dnf:
        name: epel-release
        state: present
      become: true
      register: epel_status

    - name: Force DNF cache refresh (Only on new EPEL install)
      ansible.builtin.dnf:
        update_cache: true
      become: true
      when: epel_status.changed # noqa: no-handler

    - name: Install FZF globally via native package manager
      ansible.builtin.dnf:
        name: fzf
        state: present
        enablerepo: epel
      become: true

    - name: Download fzf-git.sh globally (Native Curl)
      become: true
      ansible.builtin.command:
        cmd:
          curl -sSfL
          https://raw.githubusercontent.com/junegunn/fzf-git.sh/main/fzf-git.sh
          -o /usr/local/bin/fzf-git.sh
      args:
        creates: /usr/local/bin/fzf-git.sh
      # noqa command-instead-of-module

    - name: Ensure fzf-git.sh is executable
      become: true
      ansible.builtin.file:
        path: /usr/local/bin/fzf-git.sh
        mode: '0755'

    - name: Install Zoxide (Architecture Agnostic)
      become: true
      ansible.builtin.shell: |
        set -o pipefail
        curl -sSfL https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh | sh
        mv /root/.local/bin/zoxide /usr/local/bin/zoxide
      args:
        executable: /bin/bash # <-- Required for pipefail
        creates: /usr/local/bin/zoxide
      # noqa command-instead-of-module

    - name: Ensure Zoxide is executable
      become: true
      ansible.builtin.file:
        path: /usr/local/bin/zoxide
        mode: '0755'

    - name: Install Starship
      become: true
      ansible.builtin.shell: |
        set -o pipefail
        curl -sS https://starship.rs/install.sh | sh -s -- -y
      args:
        executable: /bin/bash # <-- Required for pipefail
        creates: /usr/local/bin/starship
      # noqa command-instead-of-module

    # We explicitly bypass get_url here due to Python urllib IPv6 resolution bugs in virtualized NATs.
    # The 'creates' argument makes this native command 100% idempotent.
    - name: Download official stable Neovim artifact (v0.11.5)
      become: true
      ansible.builtin.command:
        cmd:
          curl -sL
          https://github.com/neovim/neovim/releases/download/v0.11.5/nvim-linux-arm64.tar.gz
          -o /tmp/nvim-linux-arm64.tar.gz
      args:
        creates: /tmp/nvim-linux-arm64.tar.gz
      # noqa command-instead-of-module

    - name: Extract Neovim to /opt (ARM64)
      become: true
      ansible.builtin.unarchive:
        src: /tmp/nvim-linux-arm64.tar.gz
        dest: /opt
        remote_src: true
      when: ansible_facts['architecture'] == 'aarch64'

    - name: Extract Neovim to /opt (x86_64)
      become: true
      ansible.builtin.unarchive:
        src: /tmp/nvim-linux64.tar.gz
        dest: /opt
        remote_src: true
      when: ansible_facts['architecture'] == 'x86_64'

    - name: Standardize Neovim directory name (ARM64)
      become: true
      ansible.builtin.command: mv /opt/nvim-linux-arm64 /opt/nvim
      args:
        creates: /opt/nvim
      when: ansible_facts['architecture'] == 'aarch64'

    - name: Standardize Neovim directory name (x86_64)
      become: true
      ansible.builtin.command: mv /opt/nvim-linux64 /opt/nvim
      args:
        creates: /opt/nvim
      when: ansible_facts['architecture'] == 'x86_64'

    - name: Create global Neovim symlink
      become: true
      ansible.builtin.file:
        src: /opt/nvim/bin/nvim
        dest: /usr/local/bin/nvim
        state: link

    - name: Ensure user local hierarchy exists
      become: true
      ansible.builtin.file:
        path: '{{ user_home }}/.local'
        state: directory
        owner: '{{ user_name }}'
        group: '{{ user_name }}'
        mode: '0755'

    - name: Provision user-space Node.js v20 LTS (ARM64)
      become: true
      ansible.builtin.unarchive:
        src: https://nodejs.org/dist/v20.18.0/node-v20.18.0-linux-arm64.tar.xz
        dest: '{{ user_home }}/.local'
        remote_src: true
        extra_opts:
          - --strip-components=1
        owner: '{{ user_name }}'
        group: '{{ user_name }}'
        creates: '{{ user_home }}/.local/bin/node'
      when: ansible_facts['architecture'] == 'aarch64'

    - name: Provision user-space Node.js v20 LTS (x86_64)
      become: true
      ansible.builtin.unarchive:
        src: https://nodejs.org/dist/v20.18.0/node-v20.18.0-linux-x64.tar.xz
        dest: '{{ user_home }}/.local'
        remote_src: true
        extra_opts:
          - --strip-components=1
        owner: '{{ user_name }}'
        group: '{{ user_name }}'
        creates: '{{ user_home }}/.local/bin/node'
      when: ansible_facts['architecture'] == 'x86_64'

    - name: Change default shell to Zsh
      become: true
      ansible.builtin.user:
        name: '{{ user_name }}'
        shell: /usr/bin/zsh

    - name: Ensure target configuration directories exist
      become: true
      ansible.builtin.file:
        path: '{{ user_home }}/.config/starship'
        state: directory
        owner: '{{ user_name }}'
        group: '{{ user_name }}'
        mode: '0755'

    - name: Deploy Starship telemetry configuration to hypervisor
      become: true
      ansible.builtin.copy:
        src: "{{ lookup('env', 'HOME') }}/.config/starship/starship.toml"
        dest: '{{ user_home }}/.config/starship/starship.toml'
        owner: '{{ user_name }}'
        group: '{{ user_name }}'
        mode: '0644'

    - name: Initialize Starship engine in Target Zshrc
      become: true
      ansible.builtin.blockinfile:
        path: '{{ user_home }}/.zshrc'
        create: true
        owner: '{{ user_name }}'
        group: '{{ user_name }}'
        mode: '0644'
        marker: '# {mark} ANSIBLE MANAGED BLOCK: STARSHIP'
        block: |
          export PATH="$HOME/.local/bin:$PATH"
          export LANG=en_GB.UTF-8
          export LC_ALL=en_GB.UTF-8
          export STARSHIP_CONFIG="$HOME/.config/starship/starship.toml"
          eval "$(starship init zsh)"

    - name: Inject DkS Cap Function into Target Zshrc
      become: true
      ansible.builtin.blockinfile:
        path: '{{ user_home }}/.zshrc'
        create: true
        owner: '{{ user_name }}'
        group: '{{ user_name }}'
        mode: '0644'
        marker: '# {mark} ANSIBLE MANAGED BLOCK: DKS CAP FUNCTION'
        block: |
          # =============================================================================
          # DkS Engine: Frictionless Routing (Obsidian Capture)
          # =============================================================================
          cap() {
              local message="$1"
              local date_stamp=$(date +'%Y-%m-%d')
              local time_stamp=$(date +'%H:%M:%S')

              # Point directly to the Lima host mount, bypassing the VM guest $HOME
              local vault_dir="/Users/homelab/obsidian/00-Inbox/02-Daily"
              local log_file="$vault_dir/${date_stamp}.md"

              # Ensure the destination directory exists
              mkdir -p "$vault_dir"

              # Format the payload and append to the daily markdown note
              {
                  echo -e "\n### [$time_stamp] Execution Telemetry"
                  [[ -n "$message" ]] && echo -e "**Context:** $message"
                  echo '```console'
                  cat -
                  echo '```'
                  echo -e "---\n"
              } >> "$log_file"
          }

    # ==============================================================================
    # 🚀 DKS WORKSPACE & INFRASTRUCTURE SYNCHRONIZATION
    # ==============================================================================

    - name: Ensure DKS scripts directory exists
      become: true
      ansible.builtin.file:
        path: '{{ user_home }}/scripts'
        state: directory
        owner: '{{ user_name }}'
        group: '{{ user_name }}'
        mode: '0755'

    - name: Deploy DKS Tmux Ignition Payload
      become: true
      ansible.builtin.copy:
        src: "{{ lookup('env', 'HOME') }}/scripts/dks-boot.sh"
        dest: '{{ user_home }}/scripts/dks-boot.sh'
        owner: '{{ user_name }}'
        group: '{{ user_name }}'
        mode: '0755'

    - name: Deploy DKS Tmux Visual Configuration (Titanium Aesthetic)
      become: true
      ansible.builtin.copy:
        src: "{{ lookup('env', 'HOME') }}/.tmux.conf"
        dest: '{{ user_home }}/.tmux.conf'
        owner: '{{ user_name }}'
        group: '{{ user_name }}'
        mode: '0644'

    - name: Synchronize LazyVim Architecture via Delta-Transfer
      become: true
      ansible.posix.synchronize:
        src: "{{ lookup('env', 'HOME') }}/.config/nvim/"
        dest: '{{ user_home }}/.config/nvim/'
        archive: true
        owner: false
        group: false
        perms: false # <-- This single flag breaks the infinite loop
        rsync_opts:
          - '--exclude=.git'
          - '--exclude=.DS_Store'

    - name: Enforce deterministic architecture permissions
      become: true
      ansible.builtin.file:
        path: '{{ user_home }}/.config/nvim/'
        state: directory
        owner: '{{ user_name }}'
        group: '{{ user_name }}'
        recurse: true
        # Capital 'X' intelligently applies 0755 to directories and 0644 to files
        mode: 'u=rwX,g=rX,o=rX'
