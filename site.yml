# vim:ft=yaml.ansible
---
- name: DevOps Idempotent Pave Sequence
  hosts: lab_nodes
  vars:
    user_name: '{{ ansible_user }}'
    user_home: '/home/{{ ansible_user }}'

  tasks:
    - name: Provision core Red Hat system packages
      become: true
      ansible.builtin.dnf:
        name:
          - epel-release
          - glibc-langpack-en
          - ncurses-term
          - git
          - zsh
          - make
          - gcc
          - unzip
          - gettext
          - curl
          - wget
          - tar
          - util-linux-user
          - readline-devel
          - nodejs
          - podman
          - skopeo
          - buildah
          - tmux
        state: present

    - name: Enforce strict UTF-8 locale for Unicode rendering
      become: true
      ansible.builtin.command: localectl set-locale LANG=en_GB.UTF-8
      changed_when: false

    - name: Clone FZF repository globally
      become: true
      ansible.builtin.git:
        repo: https://github.com/junegunn/fzf.git
        dest: /opt/fzf
        depth: 1

    - name: Install FZF binaries headless
      become: true
      ansible.builtin.command: /opt/fzf/install --bin
      args:
        creates: /opt/fzf/bin/fzf

    - name: Create global FZF symlink
      become: true
      ansible.builtin.file:
        src: /opt/fzf/bin/fzf
        dest: /usr/local/bin/fzf
        state: link

    - name: Download fzf-git.sh globally
      become: true
      ansible.builtin.get_url:
        url: https://raw.githubusercontent.com/junegunn/fzf-git.sh/main/fzf-git.sh
        dest: /usr/local/bin/fzf-git.sh
        mode: '0755'

    - name: Install Zoxide (Architecture Agnostic)
      become: true
      ansible.builtin.shell: |
        curl -sSfL https://raw.githubusercontent.com/ajeetdsouza/zoxide/main/install.sh | sh
        mv /root/.local/bin/zoxide /usr/local/bin/zoxide
      args:
        creates: /usr/local/bin/zoxide

    - name: Ensure Zoxide is executable
      become: true
      ansible.builtin.file:
        path: /usr/local/bin/zoxide
        mode: '0755'

    - name: Install Starship
      become: true
      ansible.builtin.shell:
        curl -sS https://starship.rs/install.sh | sh -s -- -y
      args:
        creates: /usr/local/bin/starship

    - name: Download official stable Neovim artifact (v0.11.5)
      ansible.builtin.get_url:
        url: https://github.com/neovim/neovim/releases/download/v0.11.5/nvim-linux-arm64.tar.gz
        dest: /tmp/nvim-linux-arm64.tar.gz
      when: ansible_facts['architecture'] == 'aarch64'

    - name: Download official stable Neovim artifact (v0.11.5)
      ansible.builtin.get_url:
        url: https://github.com/neovim/neovim/releases/download/v0.11.5/nvim-linux64.tar.gz
        dest: /tmp/nvim-linux64.tar.gz
      when: ansible_facts['architecture'] == 'x86_64'

    - name: Extract Neovim to /opt (ARM64)
      become: true
      ansible.builtin.unarchive:
        src: /tmp/nvim-linux-arm64.tar.gz
        dest: /opt
        remote_src: true
      when: ansible_facts['architecture'] == 'aarch64'

    - name: Extract Neovim to /opt (x86_64)
      become: true
      ansible.builtin.unarchive:
        src: /tmp/nvim-linux64.tar.gz
        dest: /opt
        remote_src: true
      when: ansible_facts['architecture'] == 'x86_64'

    - name: Standardize Neovim directory name (ARM64)
      become: true
      ansible.builtin.command: mv /opt/nvim-linux-arm64 /opt/nvim
      args:
        creates: /opt/nvim
      when: ansible_facts['architecture'] == 'aarch64'

    - name: Standardize Neovim directory name (x86_64)
      become: true
      ansible.builtin.command: mv /opt/nvim-linux64 /opt/nvim
      args:
        creates: /opt/nvim
      when: ansible_facts['architecture'] == 'x86_64'

    - name: Create global Neovim symlink
      become: true
      ansible.builtin.file:
        src: /opt/nvim/bin/nvim
        dest: /usr/local/bin/nvim
        state: link

    - name: Change default shell to Zsh
      become: true
      ansible.builtin.user:
        name: '{{ user_name }}'
        shell: /usr/bin/zsh

    - name: Ensure target configuration directories exist
      become: true
      ansible.builtin.file:
        path: '{{ user_home }}/.config/starship'
        state: directory
        owner: '{{ user_name }}'
        group: '{{ user_name }}'
        mode: '0755'

    - name: Deploy Starship telemetry configuration to hypervisor
      become: true
      ansible.builtin.copy:
        src: "{{ lookup('env', 'HOME') }}/.config/starship/starship.toml"
        dest: '{{ user_home }}/.config/starship/starship.toml'
        owner: '{{ user_name }}'
        group: '{{ user_name }}'
        mode: '0644'

    - name: Initialize Starship engine in Target Zshrc
      become: true
      ansible.builtin.blockinfile:
        path: '{{ user_home }}/.zshrc'
        create: true
        owner: '{{ user_name }}'
        group: '{{ user_name }}'
        mode: '0644'
        marker: '# {mark} ANSIBLE MANAGED BLOCK: STARSHIP'
        block: |
          export LANG=en_GB.UTF-8
          export LC_ALL=en_GB.UTF-8
          export STARSHIP_CONFIG="$HOME/.config/starship/starship.toml"
          eval "$(starship init zsh)"
